{% load static %}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link rel="stylesheet" href="{% static 'project/css/login.css' %}">
    <script src="{% static 'project/js/login.js' %}" defer></script>
</head>
<body>
    <h1>ログイン</h1>


    <form method="post" autocomplete="off">
        {% csrf_token %}
        <label>ユーザー名:
            <input type="text" name="username" required autocomplete="off">
        </label>
        <label>パスワード:
            <input type="password" name="password" required autocomplete="new-password">
        </label>
        <button type="submit">ログイン</button>
    </form>
    
    <p class="login-footer">
        アカウントをお持ちでない場合は <a href="{% url 'project:register' %}">新規登録</a>
    </p>
</body>
</html>
