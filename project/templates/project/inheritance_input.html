{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>相続情報入力</title>
    <link rel="stylesheet" href="{% static 'css/inheritance.css' %}">
    <script src="{% static 'js/inheritance.js' %}" defer></script>
</head>
<body>
    <h1>相続情報の入力</h1>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">登録</button>
    </form>

    <p><a href="{% url 'project:login' %}">ログアウト（または再ログイン）</a></p>
</body>
</html>
