{% load static %}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規登録</title>
    <link rel="stylesheet" href="{% static 'css/register.css' %}">
    <script src="{% static 'js/register.js' %}" defer></script>
</head>
<body>
    <h1>新規登録</h1>

    <!-- メッセージ表示 -->
    {% if messages %}
        <div class="messages">
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">登録</button>
    </form>

    <p>すでにアカウントをお持ちですか？ <a href="{% url 'project:login' %}">ログイン</a></p>
</body>
</html>
