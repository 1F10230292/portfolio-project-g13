{% extends "base.html" %}
{% block content %}
{% load static %}
<link rel="stylesheet" href="{% static 'project/css/predict.css' %}">

<h2 class="mb-4">価格予測フォーム</h2>

<form method="POST" class="text-start">
  {% csrf_token %}

  <label>家の面積（㎡）:</label>
  <input type="number" name="家面積" step="0.1"><br>

  <label>延べ床面積（㎡）:</label>
  <input type="number" name="延べ床面積" step="0.1"><br>

  <label>土地面積（㎡）:</label>
  <input type="number" name="土地面積" step="0.1"><br>

  <label>築年数:</label>
  <input type="number" name="築年数"><br>

  <label>部屋数:</label>
  <input type="number" name="部屋数"><br>

  <label>用途地域:</label>
  <select name="用途地域">
    <option value="住居系">住居系</option>
    <option value="商業系">商業系</option>
    <option value="工業系">工業系</option>
  </select><br>

  <label>接道状況:</label>
  <select name="接道状況">
    <option value="その他">その他</option>
    <option value="接道なし">接道なし</option>
    <option value="角地等">角地等</option>
  </select><br>

  <label>建物構造:</label>
  <select name="建物構造">
    <option value="木造">木造</option>
    <option value="非木造">非木造</option>
  </select><br>

  <label>駐車場あり:</label>
  <input type="checkbox" name="駐車場あり"><br>

  <label>建ぺい率（%）:</label>
  <input type="number" name="建ぺい率" step="0.1"><br>

  <label>容積率（%）:</label>
  <input type="number" name="容積率" step="0.1"><br>

  <label>最寄り駅:</label>
  <select name="駅名">
    <option value="豊岡駅">豊岡駅</option>
    <option value="江原駅">江原駅</option>
    <option value="国府駅">国府駅</option>
    <option value="その他">その他の駅</option>
  </select><br>

  <label>地区名:</label>
  <select name="地区名">
    <option value="中央町">中央町</option>
    <option value="若松町">若松町</option>
    <option value="千代田町">千代田町</option>
    <option value="城南町">城南町</option>
    <option value="弥栄町">弥栄町</option>
    <option value="桜町">桜町</option>
    <option value="九日市上町">九日市上町</option>
    <option value="九日市中町">九日市中町</option>
    <option value="九日市下町">九日市下町</option>
    <option value="城崎町湯島">城崎町湯島</option>
    <option value="出石町">出石町</option>
    <option value="日高町">日高町</option>
    <option value="竹野町">竹野町</option>
    <option value="但東町">但東町</option>
    <option value="その他">その他</option>
  </select><br>

  <button type="submit" class="btn btn-primary mt-3">予測する</button>
</form>

{% if prediction %}
<h3 class="mt-4">予測価格: {{ prediction }} 万円</h3>
{% else %}
<h3 class="mt-4">値を入してください</h3>
{% endif %}
</form>


<button type="button" id="resetBtn" class="btn btn-secondary mt-3">入力をリセット</button>

<script>
  // 全 input / select を対象にする
  const fields = document.querySelectorAll("input, select");

  // ページ読み込み時に localStorage から復元
  fields.forEach(field => {
    const key = field.name;
    const saved = localStorage.getItem(key);

    if (saved !== null) {
      if (field.type === "checkbox") {
        field.checked = saved === "true";
      } else {
        field.value = saved;
      }
    }

    // 入力のたびに保存
    field.addEventListener("input", () => {
      if (field.type === "checkbox") {
        localStorage.setItem(key, field.checked);
      } else {
        localStorage.setItem(key, field.value);
      }
    });
  });

  // リセットボタン
  document.getElementById("resetBtn").addEventListener("click", () => {
    fields.forEach(field => {
      const key = field.name;
      localStorage.removeItem(key);  // localStorage から削除

      if (field.type === "checkbox") {
        field.checked = false;
      } else {
        field.value = "";
      }
    });

    alert("入力内容をリセットしました");
  });

</script>
{% endblock %}
