{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>引継ぎパスワード発行</title>
  <link rel="stylesheet" href="{% static 'project/css/transfer_password.css' %}">
</head>
<body>
  <div class="card">
    <h1>引継ぎパスワードを発行しました</h1>

    {% if deceased_name %}
      <p class="hint">被相続人：<strong>{{ deceased_name }}</strong></p>
    {% endif %}

    <p class="hint">このパスワードを使うと、被相続人の遺産情報にアクセスできます。大切に保管してください。</p>

    <div role="status" aria-live="polite">
      <span class="pw" id="transferPassword">{{ transfer_password }}</span>
    </div>

    <div class="btn-area">
      <button class="btn btn-primary" id="copyBtn" type="button">コピー</button>
      <button class="btn btn-outline" id="printBtn" type="button">印刷</button>
    </div>

    <p class="small">
      ※パスワードは一度しか表示されない場合があります。必ずメモするか安全な場所に保存してください。<br>
      ※紛失した場合は、管理者にお問い合わせください。
    </p>

    <div class="btn-area">
      <a href="{% url 'project:inheritance_input' %}" class="btn btn-outline">相続情報の編集に戻る</a>
      <a href="{% url 'project:top' %}" class="btn btn-outline">トップへ戻る</a>
    </div>
  </div>

  <script src="{% static 'project/js/transfer_password.js' %}"></script>
</body>
</html>
